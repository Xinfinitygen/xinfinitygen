<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1280" height="400" fill="#09090B"/>

  <!-- Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#1F2937" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- Accent Line -->
  <rect x="80" y="70" width="6" height="220" rx="3" fill="#3B82F6"/>

  <!-- Name -->
  <text
    x="110"
    y="130"
    fill="white"
    font-size="58"
    font-family="Arial"
    font-weight="700">
    OKECHUKWU
  </text>

  <!-- Role -->
  <text
    x="110"
    y="170"
    fill="#3B82F6"
    font-size="22"
    font-family="Arial">
    FRONTEND ENGINEER
  </text>

  <!-- Description -->
  <text
    x="110"
    y="235"
    fill="#CBD5E1"
    font-size="24"
    font-family="Arial">
    Building thoughtful web experiences through clean architecture.
  </text>

  <text
    x="110"
    y="270"
    fill="#CBD5E1"
    font-size="24"
    font-family="Arial">
    Dream. Code. Repeat.
  </text>

  <!-- Developer OS -->
  <rect
    x="820"
    y="70"
