  </text>

  <text
    x="850"
    y="185"
    fill="white"
    font-size="18"
    font-family="Courier New">
    BUILD: Browser Extension
  </text>

  <text
    x="850"
    y="220"
    fill="white"
    font-size="18"
    font-family="Courier New">
    LEARNING: React
  </text>

  <text
    x="850"
    y="255"
    fill="white"
    font-size="18"
