<svg width="1280" height="500" viewBox="0 0 1280 500" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1F2937" stroke-width="1"/>
    </pattern>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- Background -->

  <rect width="1280" height="500" fill="url(#bg)"/>

  <rect width="1280" height="500" fill="url(#grid)"/>

  <circle cx="1030" cy="130" r="260" fill="url(#glow)"/>

  <!-- Left Accent -->

  <rect x="90" y="90" width="6" height="250" rx="3" fill="#3B82F6"/>

  <!-- Name -->

  <text x="120"
        y="145"
        fill="white"
        font-size="68"
        font-family="Arial"
        font-weight="700">
        OKECHUKWU
  </text>

  <!-- Role -->

  <text x="120"
        y="190"
        fill="#60A5FA"
        font-size="26"
        font-family="Arial"
        letter-spacing="6">
        FRONTEND ENGINEER
  </text>

  <!-- Description -->

  <text x="120"
        y="255"
        fill="#CBD5E1"
        font-size="28"
        font-family="Arial">
        Building thoughtful digital experiences
  </text>

  <text x="120"
        y="292"
        fill="#CBD5E1"
        font-size="28"
        font-family="Arial">
        through clean code and intentional design.
  </text>

  <!-- Divider -->

  <line
      x1="120"
      y1="340"
      x2="1120"
      y2="340"
      stroke="#374151"/>

  <!-- Mission -->

  <text x="120"
        y="392"
        fill="#60A5FA"
        font-size="18"
        font-family="Arial">
        CURRENT MISSION
  </text>

  <text x="120"
        y="430"
        fill="white"
        font-size="26"
        font-family="Arial">
        Building products people genuinely enjoy using.
  </text>

  <!-- Status Pill -->

  <rect
      x="935"
      y="70"
      width="250"
      height="48"
      rx="24"
      fill="#111827"
      stroke="#374151"/>

  <circle
      cx="965"
      cy="94"
      r="6"
      fill="#22C55E"/>

  <text
      x="985"
      y="101"
      fill="white"
      font-size="18"
      font-family="Arial">
      AVAILABLE TO BUILD
  </text>

</svg>